[phases.setup]
aptPkgs = [
    'libpango-1.0-0',
    'libpangocairo-1.0-0', 
    'libgdk-pixbuf2.0-0',
    'libffi-dev',
    'shared-mime-info',
    'libcairo2',
    'libpangoft2-1.0-0'
]

[phases.install]
cmds = ['pip install -r requirements.txt']

[phases.build]
cmds = ['python manage.py collectstatic --noinput']

[start]
cmd = 'python manage.py migrate && gunicorn ronix_project.wsgi --timeout 120 --workers 2'
