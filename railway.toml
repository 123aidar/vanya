[build]
builder = "NIXPACKS"

[build.nixpacksSettings]
# Команды перед сборкой
nixpacksPlan = { setup = ["pip install -r requirements.txt"], buildImage = "python:3.11" }

[deploy]
startCommand = "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn ronix_project.wsgi"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
