[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate && python manage.py populate_data && python manage.py fix_completed_dates && python manage.py collectstatic --noinput && gunicorn ronix_project.wsgi --timeout 120 --workers 2"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
